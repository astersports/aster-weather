name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-test:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run check

      - name: Test
        run: pnpm run test

  # Supply-chain faucet gate — mirrors astersports/aster-sports (Phase 0.0 /
  # PLAN_ON_TRUTH). Dependency changes that are a major-version bump (or touch a
  # money/child/auth-adjacent package, none present here today) must NOT auto-
  # merge on green — they require a human owner, who releases the PR with the
  # `dep-review-approved` label. Minor/patch bumps to non-sensitive deps pass
  # and stay auto-mergeable. Gate by what the dependency TOUCHES, not the
  # version-jump size. This repo is the shared package every other consumes, so
  # a surprise major here ripples cross-repo — hence the gate. PR-only.
  # NOTE (owner): to BLOCK merge, mark this a REQUIRED status check in branch
  # protection — the job alone only reports.
  dependency-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Resolve base + head package.json + lockfile (P1-A — scan the resolved tree)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          LOCK=pnpm-lock.yaml
          git show "$BASE_SHA:package.json" > /tmp/base-package.json 2>/dev/null || echo '{}' > /tmp/base-package.json
          cp package.json /tmp/head-package.json
          git show "$BASE_SHA:$LOCK" > /tmp/base-lock 2>/dev/null || : > /tmp/base-lock
          cp "$LOCK" /tmp/head-lock 2>/dev/null || : > /tmp/head-lock
      - name: Gate major / money-child-auth dependency changes (resolved tree)
        env:
          BASE_PKG: /tmp/base-package.json
          HEAD_PKG: /tmp/head-package.json
          BASE_LOCK: /tmp/base-lock
          HEAD_LOCK: /tmp/head-lock
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: node scripts/dependency-gate.mjs
