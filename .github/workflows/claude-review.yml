name: Claude adversarial review

# An independent AI reviewer on every EXPENSIVE-surface PR — a second pair of eyes
# whose job is to CORRECT the author, not rubber-stamp. Reproduces the "architect
# corrects CC" lane, automatically, where a miss is costly. Comments only (never gates).
#
# SURFACE GATE (operator/architect ruling 2026-07-24). The reviewer no longer runs on
# every PR — every run spends real API credit, and running it on docs/refactor/chrome
# PRs drained the key. It now runs:
#   - AUTOMATICALLY when the PR touches an EXPENSIVE surface — where a missed defect is
#     costly: money paths, DB schema/migrations, child-data forms, floors & guards, the
#     CI gates themselves, or admin surfaces that write real records. See EXPENSIVE_RE
#     below (the enumerated path set for THIS repo — a sibling repo carries its own list).
#   - ON DEMAND anywhere else (docs, refactors, chrome) by adding the `review` label to
#     the PR. The label forces a run on ANY surface — the manual escape hatch.
# A PR that is neither expensive-touching nor labelled gets NO review and the job still
# succeeds green (nothing to skip-fail).
#
# Cost control (unchanged): skips bot PRs (Dependabot etc. — their CI gates them) and
# stays a silent no-op until the ANTHROPIC_API_KEY org secret is set. Uses Sonnet 5,
# with a bounded --max-turns and cancel-in-progress concurrency to cap spend per PR.
#
# Posting: findings go up as INLINE PR review comments via the action's own
# inline-comment tool, plus ONE top-level summary via `gh pr comment`. The tools the
# prompt uses MUST be granted in claude_args --allowedTools, or the action burns its
# turns on permission denials and never posts. Config mirrors the official
# anthropics/claude-code-action docs (solutions.md -> "Automatic PR Code Review").

on:
  pull_request:
    # `labeled` lets the `review` label force an on-demand run on any surface.
    types: [opened, synchronize, labeled]

permissions:
  contents: read
  pull-requests: write
  id-token: write # required by claude-code-action (OIDC)

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Human / Claude-Code-authored PRs only — bots are gated by CI, not reviewed.
    if: github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    env:
      HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY }} # empty until provisioned -> steps skip
    steps:
      # Decide whether this PR earns a review: expensive surface (auto) OR `review` label
      # (manual). Gated on HAS_KEY so the whole job stays a clean no-op when the secret is
      # unset — same skip-clean behaviour as before the surface gate.
      - name: Decide whether to review
        id: gate
        if: env.HAS_KEY != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HAS_REVIEW_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'review') }}
        run: |
          set -euo pipefail
          # Manual escape hatch: the `review` label forces a run on ANY surface.
          if [ "$HAS_REVIEW_LABEL" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Review reason: 'review' label present."
            exit 0
          fi
          # EXPENSIVE surfaces for aster-weather (enumerated 2026-07-24). This is a small
          # cross-repo package: framework-agnostic weather DATA/ADVISORY logic consumed by
          # every Aster repo. A logic or threshold bug here ships to EVERY consumer, so the
          # data layer is the costly-miss surface; the presentational icon subtree and docs
          # are cheap-miss (label bucket). Keep this list in sync with the repo.
          #
          # Two kinds of rule below. DIRECTORY / FILE rules (each ^-anchored) — a surface is
          # expensive by WHERE it lives:
          #   ^src/[^/]+\.ts        the weather logic + threshold layer: forecast · nowcast ·
          #                         current · daily · wmo maps · parsePrecip · forecastWindow ·
          #                         coordsForEvent · helpers · cache · index · types (the
          #                         thresholds: SEVERE_WIND/GUST_MPH, FORECAST_DAYS, windows).
          #                         Root src/*.ts is ENTIRELY core data/advisory logic; the
          #                         presentational src/icons/** subtree and the src/__tests__/**
          #                         suite are deliberately NOT auto-expensive (chrome + tests ->
          #                         label; control-class tests are caught by the rules below).
          #   package.json          the published surface: version, exports, files, deps.
          #   tsconfig(.build).json the build/publish config — controls what dist emits to
          #                         every consumer (build extends the base).
          #   scripts/**            the supply-chain dependency-gate (a CI gate / control).
          #   .github/workflows/**  the CI gates themselves.
          # CONTROL-CLASS rules (match a guard/lock/invariant test in ANY directory, not just
          # src/) — a surface is expensive by WHAT IT IS. Guards and floors are a class that
          # spans directories, and a PR that lowers a threshold AND lowers its guard in the
          # same diff is exactly the change that most needs a second reader. A change to a
          # control belongs in the same tier as a change to the data layer, wherever the
          # control's test file happens to live:
          #   **/*[Gg]uard*.test.*  any weather guard test (e.g. a future threshold/floor guard)
          #   **/*[Ll]ock.test.*    any future *Lock test
          #   **/*[Ii]nvariant.test.* cross-surface invariant locks (e.g. a future icon-key /
          #                         WMO-map invariant)
          EXPENSIVE_RE='(^src/[^/]+\.ts|^package\.json|^tsconfig(\.build)?\.json|^scripts/|^\.github/workflows/|[^/]*[Gg]uard[^/]*\.test\.|[^/]*[Ll]ock\.test\.|[^/]*[Ii]nvariant\.test\.)'
          FILES="$(gh pr diff "$PR" --repo "$REPO" --name-only)"
          echo "Changed files:"; echo "$FILES"
          if echo "$FILES" | grep -qE "$EXPENSIVE_RE"; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Review reason: PR touches an expensive surface."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No expensive surface touched and no 'review' label — skipping review (add the 'review' label to force one)."
          fi
      - name: Checkout
        if: env.HAS_KEY != '' && steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Adversarial review
        if: env.HAS_KEY != '' && steps.gate.outputs.run == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are an INDEPENDENT ADVERSARIAL REVIEWER of this pull request — a second
            pair of eyes whose job is to CORRECT the author, not to approve. Assume the
            author (often another Claude) may be confidently wrong. Your value is finding
            what they missed.

            FIRST read this repo's CLAUDE.md and docs/AUTOMATION_CHARTER.md if present —
            violations of the house rules are the highest-value findings.

            Then tear into the DIFF and hunt for:
            - Correctness: logic errors, off-by-one, null/undefined, wrong assumptions,
              missed edge cases, race conditions, silent error-swallowing.
            - Security / safety: injection, auth or permission gaps, secret leaks, SSRF,
              privilege escalation, money-path or minor-PII exposure, a bypassed gate.
            - Approach: is there a simpler or more correct design the author missed? Did
              they build a parallel system, duplicate a source of truth, or misread the
              requirement?
            - House-rule violations against CLAUDE.md (registered anti-patterns, token /
              naming rules, file-size caps, fail-closed expectations).

            The PR branch is already checked out in the current working directory. You may
            Read/Grep/Glob files in THIS repo to verify claims (e.g. read the code a doc
            describes, or grep for a symbol) — grounding a finding beats asserting it.

            SCOPE — you can see ONLY this one repo's checkout. A pointer to a file in a
            SIBLING repo (e.g. `astersports/aster-io` -> `docs/PORTFOLIO_MAP.md`) CANNOT be
            verified from here — do NOT report a cross-repo pointer as a dead link or a
            defect. At most note it as "unverifiable from this repo" and move on.

            HOW TO POST — post GitHub comments, do NOT just reply as a chat message:
            - Use `mcp__github_inline_comment__create_inline_comment` (with
              `confirmed: true`) to attach each finding to the exact offending line(s).
              For each finding: quote the code, explain why it is wrong and how it fails,
              propose the fix, and tag severity CRITICAL / MAJOR / MINOR.
            - Use `gh pr comment` for ONE short top-level summary (a count by severity,
              or a single line "diff is clean" if you genuinely found nothing).
            - Be direct and specific. No praise, no formatting nitpicks. Only post GitHub
              comments — don't submit the review as a chat message.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(cat:*),Bash(ls:*),Bash(find:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Read,Grep,Glob"
            --max-turns 40
            --model claude-sonnet-5
