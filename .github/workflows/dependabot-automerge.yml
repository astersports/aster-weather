name: Dependabot auto-merge

# Auto-merges Dependabot MINOR and PATCH updates once CI is green. MAJOR updates
# are never touched — they wait for a human (they can carry breaking changes).
# Uses GitHub's native auto-merge, so it only ever merges on green required checks.
# Requires the repo setting "Allow auto-merge" to be on.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Read Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge for minor + patch
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
